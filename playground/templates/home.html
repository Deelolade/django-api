<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deelolade's Django Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <section class="bg-success text-white py-5">
        <div class="container">
    
            <!-- Header -->
            <div class="text-center mb-4">
                <h1 class="display-4 fw-bold">Deelolade's Blogs</h1>
                <p class="lead">
                    Read the latest articles, tutorials, and insights from our developers.
                </p>
            </div>
    
            <!-- Search + CTA -->
            <div class="row justify-content-center mb-5">
                <div class="col-md-8">
                    <div class="input-group shadow">
                        <input type="text" class="form-control search-bar" placeholder="Search blogs..." >
                        <button class="btn btn-dark">Search</button>
                    </div>
                </div>
            </div>
    
            <!-- Quick categories -->
            <div class="d-flex flex-wrap justify-content-center gap-2">
                <span class="badge bg-light text-dark px-3 py-2">Django</span>
                <span class="badge bg-light text-dark px-3 py-2">Python</span>
                <span class="badge bg-light text-dark px-3 py-2">Web Dev</span>
                <span class="badge bg-light text-dark px-3 py-2">APIs</span>
                <span class="badge bg-light text-dark px-3 py-2">JavaScript</span>
            </div>
    
        </div>
    </section>
    <section>
        {% for post in posts %}

  <h2>
    <a href="{% url 'post_detail' post.id %}" target="_blank">{{ post.title }}</a>
  </h2>
{% endfor %}
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
